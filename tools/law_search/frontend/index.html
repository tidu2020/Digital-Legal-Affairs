<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法条检索 - 国企数字法务平台</title>
    <style>
        :root { --primary:#8B1A1A; --primary-light:#A52A2A; --accent:#B8860B; --bg:#faf8f6; --card:#fff; --text:#1a1a1a; --text-secondary:#5a5a5a; --border:#e8e0d8; --success:#2e7d32; --radius:12px; --radius-sm:8px; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        .header { background:linear-gradient(135deg,var(--primary),var(--primary-light)); color:white; padding:0 24px; height:56px; display:flex; align-items:center; justify-content:space-between; }
        .header-left { display:flex; align-items:center; gap:12px; }
        .back-btn { background:rgba(255,255,255,0.1); border:none; color:white; padding:6px 12px; border-radius:6px; cursor:pointer; font-size:13px; }
        .back-btn:hover { background:rgba(255,255,255,0.2); }
        .header h1 { font-size:16px; font-weight:600; }
        .main { max-width:800px; margin:0 auto; padding:60px 32px; text-align:center; }
        .icon { font-size:80px; margin-bottom:24px; }
        .title { font-size:24px; font-weight:600; margin-bottom:12px; color:var(--primary); }
        .desc { font-size:15px; color:var(--text-secondary); line-height:1.8; margin-bottom:32px; }
        .features { text-align:left; margin:0 auto 40px; max-width:500px; }
        .feature { display:flex; gap:12px; margin-bottom:16px; align-items:flex-start; }
        .feature-icon { font-size:20px; flex-shrink:0; margin-top:2px; }
        .feature-text { font-size:14px; color:var(--text-secondary); line-height:1.6; }
        .btn-primary { display:inline-block; padding:14px 32px; background:var(--primary); color:white; border:none; border-radius:var(--radius-sm); font-size:16px; font-weight:500; cursor:pointer; text-decoration:none; transition:background 0.2s; }
        .btn-primary:hover { background:var(--primary-light); }
        .btn-secondary { display:inline-block; margin-left:12px; padding:14px 32px; background:var(--card); color:var(--primary); border:2px solid var(--primary); border-radius:var(--radius-sm); font-size:16px; font-weight:500; cursor:pointer; text-decoration:none; transition:all 0.2s; }
        .btn-secondary:hover { background:var(--primary); color:white; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <button class="back-btn" onclick="window.location.href='/'">← 返回</button>
            <h1>📑 法条检索</h1>
        </div>
    </header>
    <div class="main">
        <div class="icon">📚</div>
        <h2 class="title">国家法律法规数据库</h2>
        <p class="desc">
            对接全国人民代表大会建设的国家法律法规数据库，<br>
            提供法律法规全文检索、时效性查询等服务。
        </p>
        <div class="features">
            <div class="feature">
                <span class="feature-icon">✅</span>
                <span class="feature-text">收录宪法、法律、行政法规、地方性法规等</span>
            </div>
            <div class="feature">
                <span class="feature-icon">🔍</span>
                <span class="feature-text">支持按名称、关键词、发布机关等多维度检索</span>
            </div>
            <div class="feature">
                <span class="feature-icon">📋</span>
                <span class="feature-text">查看法律法规原文、目录结构、时效状态</span>
            </div>
        </div>
        <a class="btn-primary" href="https://flk.npc.gov.cn" target="_blank">🔗 打开法律法规数据库</a>
        <a class="btn-secondary" href="https://flk.npc.gov.cn/fl.html" target="_blank">📋 直接搜索法律</a>
    </div>
</body>
</html>
