# 本地大模型联网搜索配置文件

# 大模型配置
[llm]
# 后端类型: ollama, vllm, openai_compatible
backend = "ollama"

# 模型名称
model = "llama3"

# API 地址
# Ollama 默认: http://localhost:11434
# vLLM 默认: http://localhost:8000
base_url = "http://localhost:11434"

# API Key（如需要）
api_key = ""

# 模型参数
[llm.params]
temperature = 0.7
top_p = 0.9
max_tokens = 2048

# 搜索引擎配置
[search]
# 搜索引擎: duckduckgo, bing, google
engine = "duckduckgo"

# Bing API Key（使用 Bing 时需要）
# 注册: https://www.microsoft.com/en-us/bing/apis
bing_api_key = ""

# Google API Key 和 Search Engine ID（使用 Google 时需要）
# 注册: https://developers.google.com/custom-search/v1/introduction
google_api_key = ""
google_search_engine_id = ""

# 搜索结果数量
num_results = 5

# 智能体配置
[agent]
# 最大工具调用次数
max_tool_calls = 5

# 是否显示详细信息
verbose = true

# 自定义系统提示词（留空使用默认）
system_prompt = ""
